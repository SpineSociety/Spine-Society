<!-- SVG-based placeholder background (can be converted to PNG) -->
<svg width="1200" height="1600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-gradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#1a1410;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d0a08;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050403;stop-opacity:1" />
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0.3" />
    </filter>
  </defs>
  
  <!-- Base gradient -->
  <rect width="1200" height="1600" fill="url(#bg-gradient)"/>
  
  <!-- Subtle texture overlay -->
  <rect width="1200" height="1600" fill="#080706" opacity="0.7" filter="url(#noise)"/>
  
  <!-- Decorative light accents (book-like appearance) -->
  <circle cx="200" cy="300" r="150" fill="#c8a36a" opacity="0.08"/>
  <circle cx="1000" cy="1200" r="200" fill="#c8a36a" opacity="0.05"/>
  
  <!-- Library shelf-inspired horizontal lines -->
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#c8a36a" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="800" x2="1200" y2="800" stroke="#c8a36a" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="1200" x2="1200" y2="1200" stroke="#c8a36a" stroke-width="1" opacity="0.1"/>
</svg>
