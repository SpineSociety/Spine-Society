<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Spine Society</title>

<style>

:root {

  --charcoal:#1C1C1E;

  --card:#2A2A2D;

  --dark:#1F1F22;

  --ivory:#F5F5F2;

  --sage:#8A9A8A;

  --muted:#BFBAB2;

  --danger:#D8A1A1;

}

* { box-sizing:border-box; }

body {

  margin:0;

  font-family:-apple-system, BlinkMacSystemFont, "Inter", sans-serif;

  background:var(--charcoal);

  color:var(--ivory);

  padding:24px 16px 40px;

}

.app {

  max-width:430px;

  margin:auto;

}

.header {

  text-align:center;

  margin-bottom:24px;

}

h1 {

  font-family:Georgia, serif;

  font-size:2.6rem;

  margin:8px 0 4px;

}

.subtitle {

  color:var(--muted);

  margin:0;

}

.card {

  background:var(--card);

  border-radius:26px;

  padding:20px;

  margin-bottom:18px;

  box-shadow:0 12px 35px rgba(0,0,0,.28);

}

h2 {

  font-family:Georgia, serif;

  margin-top:0;

}

input, select, button {

  width:100%;

  padding:14px;

  margin:7px 0;

  border-radius:16px;

  border:none;

  font-size:1rem;

}

input, select {

  background:var(--dark);

  color:var(--ivory);

  border:1px solid rgba(255,255,255,.08);

}

button {

  background:var(--sage);

  color:#111;

  font-weight:700;

  cursor:pointer;

}

button:disabled {

  opacity:.5;

}

.secondary-btn {

  background:transparent;

  color:var(--muted);

  border:1px solid rgba(255,255,255,.14);

}

.danger-btn {

  background:transparent;

  color:var(--danger);

  border:1px solid rgba(216,161,161,.3);

}

.spin-btn {

  background:var(--ivory);

  color:#111;

  font-size:1.1rem;

  padding:16px;

}

.book-item, .picked-item {

  background:var(--dark);

  padding:14px;

  border-radius:18px;

  margin:10px 0;

  border:1px solid rgba(255,255,255,.08);

}

.small {

  color:var(--muted);

  font-size:.85rem;

}

.empty {

  color:var(--muted);

  text-align:center;

}

.wheel {

  margin:18px auto;

  width:180px;

  height:180px;

  border-radius:50%;

  border:8px solid var(--sage);

  border-top-color:var(--ivory);

  display:flex;

  align-items:center;

  justify-content:center;

  font-family:Georgia, serif;

  background:var(--dark);

  transition:transform 2.4s cubic-bezier(.15,.85,.25,1);

}

.wheel.spinning {

  transform:rotate(1800deg);

}

.winner {

  margin-top:18px;

  padding:18px;

  background:var(--dark);

  border-radius:22px;

  text-align:center;

}

.winner img {

  width:135px;

  max-height:205px;

  object-fit:cover;

  border-radius:14px;

  box-shadow:0 10px 28px rgba(0,0,0,.4);

}

.winner h3 {

  font-family:Georgia, serif;

  font-size:1.35rem;

  margin-bottom:4px;

}

.sound-row {

  display:flex;

  justify-content:space-between;

  align-items:center;

  color:var(--muted);

  font-size:.9rem;

}

.toggle {

  width:auto;

  padding:8px 14px;

  border-radius:999px;

  background:var(--dark);

  color:var(--ivory);

  border:1px solid rgba(255,255,255,.12);

}

footer {

  text-align:center;

  color:#777;

  font-size:.8rem;

  margin-top:24px;

}

</style>

</head>

<body>

<div class="app">

<div class="header">

  <h1>Spine Society</h1>

  <p class="subtitle">Choose your next read.</p>

</div>

<div class="card">

  <h2>Your Shelves</h2>

  <input id="newShelfName" placeholder="Name a new shelf or book club" />

  <button onclick="createShelf()">Create Shelf</button>

  <select id="shelfSelect" onchange="changeShelf()"></select>

  <input id="renameShelfInput" placeholder="Rename selected shelf" />

  <button class="secondary-btn" onclick="renameShelf()">Rename Shelf</button>

  <button class="danger-btn" onclick="deleteCurrentShelf()">Delete Current Shelf</button>

</div>

<div class="card">

  <h2>Add Book</h2>

  <input id="title" placeholder="Book title" />

  <input id="author" placeholder="Author" />

  <select id="category">

    <option>Book Club Pick</option>

    <option>Thriller</option>

    <option>Romance</option>

    <option>Fantasy</option>

    <option>Mystery</option>

    <option>Cozy Read</option>

    <option>Wild Card</option>

  </select>

  <input id="image" placeholder="Book cover image URL optional" />

  <button onclick="addBook()">Add to Selected Shelf</button>

</div>

<div class="card">

  <h2>Spin This Shelf</h2>

  <select id="spinCategory">

    <option>All Books</option>

    <option>Book Club Pick</option>

    <option>Thriller</option>

    <option>Romance</option>

    <option>Fantasy</option>

    <option>Mystery</option>

    <option>Cozy Read</option>

    <option>Wild Card</option>

  </select>

  <div id="wheel" class="wheel">Spin</div>

  <button id="spinButton" class="spin-btn" onclick="spinBook()">Spin</button>

  <div class="sound-row">

    <span>Sound</span>

    <button class="toggle" onclick="toggleSound()" id="soundToggle">On</button>

  </div>

  <div id="winner"></div>

</div>

<div class="card">

  <h2>Selected Shelf</h2>

  <div id="bookList"></div>

</div>

<div class="card">

  <h2>Saved Picks</h2>

  <div id="pickedList"></div>

</div>

<footer>Spine Society · Your shelf, decided.</footer>

</div>

<audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3"></audio>

<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>

let appData = JSON.parse(localStorage.getItem("spineSocietyData")) || {

  currentShelf: "Personal Shelf",

  shelves: { "Personal Shelf": [] },

  picked: []

};

let lastPick = null;

let soundOn = JSON.parse(localStorage.getItem("spineSoundOn"));

if (soundOn === null) soundOn = true;

function saveData() {

  localStorage.setItem("spineSocietyData", JSON.stringify(appData));

}

function getCurrentBooks() {

  return appData.shelves[appData.currentShelf] || [];

}

function renderShelves() {

  const select = document.getElementById("shelfSelect");

  const names = Object.keys(appData.shelves);

  select.innerHTML = names.map(name =>

    `<option value="${name}" ${name === appData.currentShelf ? "selected" : ""}>${name}</option>`

  ).join("");

  displayBooks();

  displayPicked();

}

function createShelf() {

  const name = document.getElementById("newShelfName").value.trim();

  if (!name) return alert("Enter a shelf name.");

  if (appData.shelves[name]) return alert("That shelf already exists.");

  appData.shelves[name] = [];

  appData.currentShelf = name;

  document.getElementById("newShelfName").value = "";

  saveData();

  renderShelves();

}

function changeShelf() {

  appData.currentShelf = document.getElementById("shelfSelect").value;

  document.getElementById("winner").innerHTML = "";

  lastPick = null;

  saveData();

  renderShelves();

}

function renameShelf() {

  const newName = document.getElementById("renameShelfInput").value.trim();

  const oldName = appData.currentShelf;

  if (!newName) return alert("Enter a new shelf name.");

  if (appData.shelves[newName]) return alert("That shelf name already exists.");

  appData.shelves[newName] = appData.shelves[oldName];

  delete appData.shelves[oldName];

  appData.currentShelf = newName;

  document.getElementById("renameShelfInput").value = "";

  saveData();

  renderShelves();

}

function deleteCurrentShelf() {

  const names = Object.keys(appData.shelves);

  if (names.length === 1) return alert("You need at least one shelf.");

  if (!confirm(`Delete "${appData.currentShelf}" and all books inside it?`)) return;

  delete appData.shelves[appData.currentShelf];

  appData.currentShelf = Object.keys(appData.shelves)[0];

  saveData();

  renderShelves();

}

function addBook() {

  const title = document.getElementById("title").value.trim();

  const author = document.getElementById("author").value.trim();

  const category = document.getElementById("category").value;

  const image = document.getElementById("image").value.trim();

  if (!title) return alert("Enter a book title.");

  appData.shelves[appData.currentShelf].push({ title, author, category, image });

  document.getElementById("title").value = "";

  document.getElementById("author").value = "";

  document.getElementById("image").value = "";

  saveData();

  displayBooks();

}

function deleteBook(index) {

  appData.shelves[appData.currentShelf].splice(index, 1);

  saveData();

  displayBooks();

}

function updateSoundButton() {

  document.getElementById("soundToggle").textContent = soundOn ? "On" : "Off";

}

function toggleSound() {

  soundOn = !soundOn;

  localStorage.setItem("spineSoundOn", JSON.stringify(soundOn));

  updateSoundButton();

}

function playSound(id) {

  if (!soundOn) return;

  const sound = document.getElementById(id);

  sound.currentTime = 0;

  sound.play().catch(() => {});

}

function stopSound(id) {

  const sound = document.getElementById(id);

  sound.pause();

  sound.currentTime = 0;

}

function spinBook() {

  const selectedCategory = document.getElementById("spinCategory").value;

  const spinButton = document.getElementById("spinButton");

  const winnerDiv = document.getElementById("winner");

  const wheel = document.getElementById("wheel");

  const books = getCurrentBooks();

  const filtered = selectedCategory === "All Books"

    ? books

    : books.filter(b => b.category === selectedCategory);

  if (filtered.length === 0) {

    winnerDiv.innerHTML = "<p class='empty'>No books in this shelf/category yet.</p>";

    return;

  }

  spinButton.disabled = true;

  spinButton.textContent = "Choosing...";

  wheel.classList.add("spinning");

  playSound("spinSound");

  setTimeout(() => {

    stopSound("spinSound");

    const final = filtered[Math.floor(Math.random() * filtered.length)];

    lastPick = { ...final, shelf: appData.currentShelf, date: new Date().toLocaleDateString() };

    winnerDiv.innerHTML = `

      <div class="winner">

        ${final.image ? `<img src="${final.image}" alt="Book cover">` : ""}

        <h3>${final.title}</h3>

        <div>${final.author ? "by " + final.author : ""}</div>

        <div class="small">${final.category}</div>

        <button onclick="savePicked()">Save Pick</button>

        <button class="secondary-btn" onclick="sharePick()">Share Pick</button>

      </div>

    `;

    playSound("winSound");

    wheel.classList.remove("spinning");

    spinButton.disabled = false;

    spinButton.textContent = "Spin";

  }, 2500);

}

function savePicked() {

  if (!lastPick) return;

  appData.picked.unshift(lastPick);

  saveData();

  displayPicked();

  alert("Saved to picked books.");

}

async function sharePick() {

  if (!lastPick) return;

  const text = `Spine Society picked: "${lastPick.title}"${lastPick.author ? " by " + lastPick.author : ""} from ${lastPick.shelf}.`;

  try {

    await navigator.clipboard.writeText(text);

    alert("Pick copied to clipboard.");

  } catch {

    alert(text);

  }

}

function displayBooks() {

  const list = document.getElementById("bookList");

  const books = getCurrentBooks();

  if (books.length === 0) {

    list.innerHTML = "<p class='empty'>This shelf is empty.</p>";

    return;

  }

  list.innerHTML = books.map((b, i) => `

    <div class="book-item">

      <strong>${b.title}</strong><br>

      ${b.author ? `<span class="small">by ${b.author}</span><br>` : ""}

      <span class="small">${b.category}</span><br>

      <button class="secondary-btn" onclick="deleteBook(${i})">Delete Book</button>

    </div>

  `).join("");

}

function displayPicked() {

  const list = document.getElementById("pickedList");

  if (!appData.picked || appData.picked.length === 0) {

    list.innerHTML = "<p class='empty'>No saved picks yet.</p>";

    return;

  }

  list.innerHTML = appData.picked.map((p, i) => `

    <div class="picked-item">

      <strong>${p.title}</strong><br>

      ${p.author ? `<span class="small">by ${p.author}</span><br>` : ""}

      <span class="small">${p.shelf} · ${p.date}</span><br>

      <button class="danger-btn" onclick="deletePicked(${i})">Remove Pick</button>

    </div>

  `).join("");

}

function deletePicked(index) {

  appData.picked.splice(index, 1);

  saveData();

  displayPicked();

}

saveData();

renderShelves();

updateSoundButton();

</script>

</body>

</html
