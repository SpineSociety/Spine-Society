<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Spine Society" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="description" content="A cozy digital library for book lovers—organize, share, and discuss your reading collection." />
  <meta name="theme-color" content="#080706" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/cropperjs/dist/cropper.min.css" />
  <link rel="stylesheet" href="./styles.css" />

  <title>Spine Society</title>
</head>

<body>
  <div class="app-shell">
    <div class="phone-frame">
      <header class="header">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
          </svg>
        </div>
        <h1>Spine Society</h1>
        <p class="subtitle">Your Literary Haven</p>
      </header>

      <main class="app-content">
        <!-- Placeholder for app screens -->
        <!-- Navigation will be managed by JavaScript -->
        <div id="app-screens">
          <!-- Screens will be rendered here -->
        </div>
      </main>

      <!-- Bottom Navigation -->
      <nav class="top-nav" role="navigation" aria-label="Main navigation">
        <button class="nav-btn" data-screen="lounge" title="Lounge">
          <span class="nav-icon">🏛️</span>
          <span>Lounge</span>
        </button>
        <button class="nav-btn" data-screen="library" title="Library">
          <span class="nav-icon">📚</span>
          <span>Library</span>
        </button>
        <button class="nav-btn" data-screen="club" title="Club">
          <span class="nav-icon">👥</span>
          <span>Club</span>
        </button>
        <button class="nav-btn" data-screen="spin" title="Randomizer">
          <span class="nav-icon">🎲</span>
          <span>Spin</span>
        </button>
        <button class="nav-btn" data-screen="notes" title="Marginalia">
          <span class="nav-icon">✏️</span>
          <span>Notes</span>
        </button>
        <button class="nav-btn" data-screen="profile" title="Profile">
          <span class="nav-icon">👤</span>
          <span>Profile</span>
        </button>
      </nav>
    </div>
  </div>

  <!-- External Scripts -->
  <script src="https://unpkg.com/cropperjs/dist/cropper.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
