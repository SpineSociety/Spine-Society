<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Spine Society" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<title>Spine Society</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/cropperjs/dist/cropper.min.css"
/>

<script src="https://unpkg.com/cropperjs/dist/cropper.min.js"></script>

<style>
:root {
  --bg: #080706;
  --ink: #eadcc2;
  --ink-soft: #c8b994;
  --muted: #a58a5e;
  --gold: #a67c3a;
  --gold-soft: #c8a36a;
  --gold-pale: #e4c98b;
  --panel: rgba(19, 15, 12, .84);
  --panel-strong: rgba(26, 18, 13, .96);
  --line: rgba(200, 163, 106, .20);
  --line-soft: rgba(200, 163, 106, .10);
  --sage: #5e6b4a;
  --rust: #7a2f2f;
  --bluebook: #223640;
  --greenbook: #303923;
  --danger: #d8a1a1;
  --shadow: 0 28px 70px rgba(0,0,0,.62);
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  overflow-x: hidden;
  
  background:
    radial-gradient(
      circle at center,
      rgba(0,0,0,.05),
      rgba(0,0,0,.50) 55%,
      rgba(0,0,0,.88) 100%
    ),
    linear-gradient(
      180deg,
      rgba(10,5,2,.15),
      rgba(8,4,2,.72)
    ),
    url("assets/cozy-library-bg.PNG");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  padding: 0;
}


body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  display: none;

  background:
    radial-gradient(circle at 20% 18%,
      rgba(255,191,120,.12),
      transparent 20%),

    radial-gradient(circle at 82% 78%,
      rgba(200,163,106,.10),
      transparent 24%),

    radial-gradient(circle at 50% 50%,
      rgba(94,107,74,.06),
      transparent 42%),

    linear-gradient(
      90deg,
      rgba(0,0,0,.38),
      transparent 20%,
      transparent 80%,
      rgba(0,0,0,.28)
    );
}
@keyframes ambientShift {

  0% {
    transform: scale(1) translateY(0px);
    filter: blur(0px);
  }

  50% {
    transform: scale(1.03) translateY(-6px);
    filter: blur(2px);
  }

  100% {
    transform: scale(1.06) translateY(4px);
    filter: blur(0px);
  }

}

.app-shell {
  width: 100%;
  margin: 0;
  position: relative;
  z-index: 1;
}

.phone-frame {
  border: none;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  overflow: visible;
  isolation: isolate;
  min-height: 100vh;
}

.app-content {
  padding: 0 18px 92px;
}

.header {
  text-align: center;
  padding: 8px 0 18px;
}

.brand-mark {
  width: 70px;
  height: 70px;
  margin: 2px auto 12px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  color: var(--gold-pale);
  background:
    radial-gradient(circle at 32% 24%, rgba(228,201,139,.32), transparent 26%),
    linear-gradient(145deg, rgba(166,124,58,.24), rgba(15,12,9,.94));
  border: 1px solid rgba(200,163,106,.36);
  box-shadow:
    0 14px 34px rgba(0,0,0,.42),
    0 0 34px rgba(166,124,58,.18),
    inset 0 1px 0 rgba(255,255,255,.08);
}

.brand-mark svg {
  width: 42px;
  height: 42px;
}

h1, h2, h3 {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600;
  letter-spacing: .25px;
}

h1 {
  font-size: 2.65rem;
  line-height: .94;
  color: var(--gold-soft);
  margin: 0 0 8px;
  text-shadow: 0 12px 30px rgba(166,124,58,.22);
}

h2 {
  font-size: 1.52rem;
  margin: 0;
}

h3 {
  font-size: 1.35rem;
  margin: 10px 0 4px;
}

.subtitle {
  color: var(--muted);
  font-size: .95rem;
  margin: 0;
  letter-spacing: .35px;
}

.card {
  background:
    linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.02)),
    radial-gradient(circle at top left, rgba(200,163,106,.09), transparent 42%),
    rgba(18,14,11,.76);
  border: 1px solid rgba(200,163,106,.16);
  border-radius: 25px;
  padding: 18px;
  margin: 14px 0;
  box-shadow:
    0 14px 42px rgba(0,0,0,.34),
    inset 0 1px 0 rgba(255,255,255,.04);
  backdrop-filter: blur(16px);
}

.card-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  position: relative;
  padding-bottom: 11px;
  margin-bottom: 14px;
}

.card-header::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  height: 1px;
  width: 76px;
  background: linear-gradient(90deg, rgba(200,163,106,.70), transparent);
}

.helper {
  color: var(--muted);
  font-size: .88rem;
  line-height: 1.45;
  margin: 0 0 12px;
}

input, select, button {
  width: 100%;
  min-height: 48px;
  padding: 12px 15px;
  margin: 7px 0;
  border-radius: 16px;
  font-size: .94rem;
  font-family: inherit;
}

input, select {
  background: rgba(255,255,255,.035);
  color: var(--ink);
  border: 1px solid rgba(200,163,106,.18);
  outline: none;
  backdrop-filter: blur(12px);
}

input::placeholder { color: rgba(169,138,94,.74); }

input:focus, select:focus {
  border-color: rgba(200,163,106,.42);
  box-shadow: 0 0 0 4px rgba(200,163,106,.08);
}

button {
  cursor: pointer;
  border: 1px solid rgba(200,163,106,.25);
  color: var(--ink);
  background:
    linear-gradient(180deg, rgba(166,124,58,.32), rgba(166,124,58,.14));
  font-weight: 650;
  box-shadow: 0 10px 22px rgba(0,0,0,.24);
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}

button:hover {
  transform: translateY(-1px);
  border-color: rgba(228,201,139,.38);
  box-shadow: 0 14px 28px rgba(0,0,0,.30);
}

.primary {
  color: #0e0c0a;
  background: linear-gradient(180deg, rgba(228,201,139,.92), rgba(166,124,58,.82));
}

.secondary {
  color: var(--muted);
  background: rgba(255,255,255,.02);
  border-color: rgba(200,163,106,.16);
  box-shadow: none;
}

.danger {
  color: var(--danger);
  background: transparent;
  border-color: rgba(216,161,161,.28);
  box-shadow: none;
}

.screen{
  opacity:0;
  transform:translateY(14px);
  pointer-events:none;
  position:absolute;
  inset:0;
  transition:
    opacity .35s ease,
    transform .35s ease;
}

.screen.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
  position:relative;
}

.page-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 6px 0 18px;
}

.page-title {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 1.95rem;
  color: var(--gold-pale);
}

.icon-button {
  width: 42px;
  min-height: 42px;
  padding: 0;
  border-radius: 50%;
  display: grid;
  place-items: center;
}

.top-nav {
  position: fixed;
  left: 50%;
  bottom: 14px;
  transform: translateX(-50%);
  width: min(420px, calc(100% - 18px));
  z-index: 50;
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 3px;
  padding: 6px;
  border-radius: 24px;
  background: rgba(14,11,8,.88);
  border: 1px solid rgba(200,163,106,.20);
  box-shadow: 0 18px 42px rgba(0,0,0,.54);
  backdrop-filter: blur(18px);
}

.nav-btn {
  min-height: 52px;
  margin: 0;
  padding: 6px 2px;
  border-radius: 17px;
  color: var(--muted);
  background: transparent;
  border: 1px solid transparent;
  box-shadow: none;
  font-size: .62rem;
  line-height: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  white-space: nowrap;
}

.nav-btn .nav-icon {
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: currentColor;
  line-height: 1;
  font-size: 18px;
}

.nav-btn svg {
  width: 19px;
  height: 19px;
  stroke: currentColor;
  stroke-width: 1.8;
  fill: none;
}

.lounge-hero {
  min-height: 210px;
  border-radius: 28px;
  padding: 22px;
  overflow: hidden;
  position: relative;
  border: 1px solid rgba(200,163,106,.18);
  background:
    linear-gradient(90deg, rgba(9,7,5,.94), rgba(9,7,5,.60)),
    radial-gradient(circle at 84% 28%, rgba(200,163,106,.20), transparent 26%),
    linear-gradient(135deg, rgba(49,35,21,.96), rgba(8,7,6,.95));
  box-shadow: var(--shadow);
}

.lounge-hero::before {
  content: "";
  position: absolute;
  right: -24px;
  bottom: -42px;
  width: 180px;
  height: 180px;
  background: radial-gradient(circle, rgba(200,163,106,.18), transparent 64%);
  filter: blur(2px);
}
.lounge-hero::after{
  content:"";
  position:absolute;
  inset:-40%;
  background:
    radial-gradient(circle,
      rgba(255,220,150,.12),
      transparent 40%);

  animation: heroGlow 10s ease-in-out infinite alternate;
  z-index:-1;
}

@keyframes heroGlow{

  0%{
    transform:translateX(-10%) translateY(-4%);
  }

  100%{
    transform:translateX(12%) translateY(8%);
  }

}
.lounge-kicker {
  color: var(--gold-pale);
  font-size: .78rem;
  text-transform: uppercase;
  letter-spacing: 1.6px;
  margin-bottom: 8px;
}

.lounge-title {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 2.15rem;
  line-height: 1;
  color: var(--ink);
  margin: 0 0 10px;
}

.lounge-copy {
  color: var(--muted);
  line-height: 1.55;
  max-width: 260px;
  margin: 0;
  font-size: .92rem;
}

.shelf-preview {
  display: flex;
  gap: 6px;
  align-items: flex-end;
  margin-top: 18px;
}

.preview-spine {
  width: 34px;
  border-radius: 6px 6px 3px 3px;
  border: 1px solid rgba(200,163,106,.18);
  box-shadow: 0 10px 20px rgba(0,0,0,.28);
}

.preview-spine:nth-child(1) { height: 72px; background: linear-gradient(180deg, #3b4a35, #1c251b); }
.preview-spine:nth-child(2) { height: 90px; background: linear-gradient(180deg, #6b3527, #2b1712); }
.preview-spine:nth-child(3) { height: 62px; background: linear-gradient(180deg, #2a3f4a, #121f26); }
.preview-spine:nth-child(4) { height: 80px; background: linear-gradient(180deg, #4b341f, #1d130c); }

.club-card, .book-item, .picked-item, .winner, .next-read-card {
  background:
    linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015)),
    rgba(17,13,10,.82);
  border: 1px solid rgba(200,163,106,.16);
  border-radius: 21px;
  padding: 14px;
  margin: 10px 0;
}

.item-title {
  font-weight: 700;
  font-size: 1.02rem;
  line-height: 1.2;
  color: var(--ink);
}

.small {
  color: var(--muted);
  font-size: .84rem;
  line-height: 1.35;
}

.status {
  color: var(--muted);
  font-size: .94rem;
  text-align: center;
  line-height: 1.45;
  padding: 18px 10px;
}

.book-card-polished {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.book-mini-cover {
  width: 62px;
  height: 94px;
  border-radius: 8px 10px 10px 8px;
  object-fit: cover;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--line);
  flex-shrink: 0;
  box-shadow:
    0 10px 22px rgba(0,0,0,.38),
    4px 0 0 rgba(255,255,255,.04);
}

.book-mini-placeholder {
  width: 62px;
  height: 94px;
  border-radius: 8px 10px 10px 8px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.10), transparent 12%),
    linear-gradient(180deg, #4a2f1f, #16100c);
  border: 1px solid var(--line);
  color: var(--gold-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Cormorant Garamond", serif;
  font-weight: 800;
  flex-shrink: 0;
  box-shadow:
    0 10px 22px rgba(0,0,0,.38),
    4px 0 0 rgba(255,255,255,.04);
}

.book-info { flex: 1; }
.book-actions { margin-top: 10px; }

.book-category {
  display: inline-block;
  margin-top: 8px;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(200,163,106,.08);
  border: 1px solid rgba(200,163,106,.13);
  color: var(--gold-pale);
  font-size: .70rem;
}

.library-shelf {
  padding: 16px 12px;
  border-radius: 24px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
    radial-gradient(circle at top, rgba(200,163,106,.08), transparent 35%),
    rgba(14,11,8,.72);
  border: 1px solid var(--line);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}

.library-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
}

.spine-card {
  min-height: 172px;
  border-radius: 9px 11px 11px 9px;
  border: 1px solid rgba(200,163,106,.22);
  background:
    linear-gradient(90deg, rgba(255,255,255,.10), transparent 12%),
    linear-gradient(180deg, #42311f, #15100d);
  padding: 12px 7px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  text-align: center;
  font-family: "Cormorant Garamond", serif;
  color: var(--gold-pale);
  box-shadow: 0 12px 24px rgba(0,0,0,.36);
}

.spine-title {
  font-size: 1.02rem;
  line-height: 1.05;
  text-transform: uppercase;
  letter-spacing: .6px;
}

.spine-author {
  font-size: .68rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
}

.spine-card:nth-child(4n+1) { background: linear-gradient(90deg, rgba(255,255,255,.10), transparent 12%), linear-gradient(180deg, #23343a, #10191d); }
.spine-card:nth-child(4n+2) { background: linear-gradient(90deg, rgba(255,255,255,.10), transparent 12%), linear-gradient(180deg, #3b4228, #171b10); }
.spine-card:nth-child(4n+3) { background: linear-gradient(90deg, rgba(255,255,255,.10), transparent 12%), linear-gradient(180deg, #6a3627, #281410); }

.cover {
  width: 140px;
  height: 210px;
  object-fit: cover;
  border-radius: 17px;
  border: 1px solid rgba(200,163,106,.18);
  box-shadow: 0 18px 38px rgba(0,0,0,.48);
}

.cover-placeholder {
  width: 140px;
  height: 210px;
  border-radius: 17px;
  margin: 0 auto;
  display: grid;
  place-items: center;
  background:
    linear-gradient(90deg, rgba(255,255,255,.10), transparent 12%),
    linear-gradient(180deg, #4a2f1f, #14100c);
  border: 1px solid rgba(200,163,106,.18);
  color: var(--gold-pale);
  font-family: "Cormorant Garamond", serif;
  font-size: 2.4rem;
  box-shadow: 0 18px 38px rgba(0,0,0,.48);
}

.next-read-card {
  text-align: center;
}
.featured-volume-card {
  text-align: center;
  padding: 22px;
  border-radius: 28px;
  border: 1px solid rgba(200,163,106,.22);
  background:
    radial-gradient(circle at top, rgba(228,201,139,.14), transparent 42%),
    linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.018)),
    rgba(14,10,7,.88);
  box-shadow:
    0 22px 48px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.05);
}

.featured-kicker {
  color: var(--gold-soft);
  text-transform: uppercase;
  letter-spacing: 1.4px;
  font-size: .72rem;
  font-weight: 700;
  margin-bottom: 12px;
}

.featured-title {
  font-family: "Cormorant Garamond", serif;
  color: var(--gold-pale);
  font-size: 2rem;
  line-height: 1.05;
  margin-top: 12px;
}

.featured-cover-wrap {
  display: flex;
  justify-content: center;
}

.featured-volume-card .cover,
.featured-volume-card .cover-placeholder {
  width: 126px;
  height: 188px;
}
.featured-progress {
  margin-top: 16px;
  padding: 12px;
  border-radius: 18px;
  background: rgba(255,255,255,.035);
  border: 1px solid rgba(200,163,106,.14);
}

.featured-progress-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  color: var(--gold-soft);
  font-size: .62rem;
  text-transform: uppercase;
  letter-spacing: .8px;
  white-space: nowrap;
}

.featured-progress-bar {
  height: 9px;
  margin-top: 12px;
  border-radius: 999px;
  background: rgba(255,255,255,.10);
  overflow: hidden;
}
.featured-reader-row {
  display: flex;
  justify-content: center;
  gap: 7px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.featured-reader-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: linear-gradient(145deg, var(--gold-soft), var(--gold));
  color: #120b06;
  font-size: .72rem;
  font-weight: 800;
  border: 1px solid rgba(255,255,255,.18);
}
.featured-progress-fill {
  height: 100%;
  width: 35%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--gold-soft), var(--gold));
}

.next-read-card .cover,
.next-read-card .cover-placeholder {
  width: 96px;
  height: 144px;
}

.spin-display {
  min-height: 390px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.spin-card {
  width: 100%;
  min-height: 350px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  animation: finalPop .35s ease both;
}

@keyframes finalPop {
  from { opacity: 0; transform: scale(.96) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.randomizer-cabinet {
  border-radius: 30px;
  padding: 18px;
  background:
    radial-gradient(circle at top, rgba(200,163,106,.12), transparent 34%),
    linear-gradient(180deg, #1d130d, #080706);
  border: 1px solid rgba(200,163,106,.20);
  box-shadow: var(--shadow);
}

.slot-window {
  height: 360px;
  width: 100%;
  overflow: hidden;
  border-radius: 28px;
  border: 1px solid rgba(200,163,106,.18);
  background:
    radial-gradient(circle at top, rgba(200,163,106,.11), transparent 46%),
    rgba(15,12,9,.94);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}

.slot-track {
  transition: transform 2.4s cubic-bezier(.12,.82,.22,1);
}

.slot-item {
  height: 360px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.slot-card {
  width: 100%;
  text-align: center;
}

.comment-card {
  background:
    linear-gradient(180deg, rgba(255,255,255,.052), rgba(255,255,255,.018)),
    rgba(17,13,10,.72);
  border: 1px solid rgba(200,163,106,.16);
  border-radius: 20px;
  padding: 14px;
  margin-top: 12px;
}

.comment-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.comment-avatar {
  width: 38px;
  height: 38px;
  min-width: 38px;
  border-radius: 50%;
  overflow: hidden;

  flex-shrink: 0;

  background: linear-gradient(145deg, var(--gold-soft), var(--gold));
  color: #0b0806;

  display: flex;
  align-items: center;
  justify-content: center;

  font-weight: 800;
}

.comment-content { flex: 1; }

.comment-alias {
  color: var(--gold-pale);
  font-weight: 700;
  font-size: .94rem;
  margin-bottom: 6px;
}

.note-message {
  color: rgba(234,220,194,.90);
  line-height: 1.5;
  font-size: .92rem;
}

.comment-time {
  margin-top: 9px;
  font-size: .70rem;
  opacity: .58;
}

.reaction-summary {
  margin-top: 9px;
  font-size: .78rem;
  color: var(--muted);
}

.reaction-picker {
  display: none;
  gap: 8px;
